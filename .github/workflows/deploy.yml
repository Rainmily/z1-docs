name: 🚀 Deploy Docs + Auth Server

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 构建前端静态站点 ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Rspress site
        run: npm run build

      # ── 3. 打包构建产物 ──────────────────────────────────────
      - name: Package build artifacts
        env:
          COPYFILE_DISABLE: '1'
        run: |
          tar -czf doc_build.tar.gz -C doc_build .
          tar -czf server.tar.gz --exclude='node_modules' --exclude='.env' -C server .

      # ── 4. 部署到服务器 ─────────────────────────────────────
      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "doc_build.tar.gz,server.tar.gz"
          target: "/www/wwwroot/z1-docs/"
          strip_components: 0

      # ── 5. 服务器端：解压 + 重启服务 ─────────────────────────
      - name: Deploy & restart services on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            DEPLOY_DIR="/www/wwwroot/z1-docs"
            NGINX_CONF="/www/server/panel/vhost/nginx/docs.whohi.cn.ssl.conf"

            # ── 1. 解压前端构建产物 ───────────────────────────
            cd $DEPLOY_DIR
            rm -rf doc_build 2>/dev/null || true
            tar -xzf doc_build.tar.gz
            # 清理 macOS 产生的 ._ 文件
            find . -name '._*' -delete 2>/dev/null || true
            rm doc_build.tar.gz
            chown -R lighthouse:lighthouse .
            echo "✅ 前端静态站点已解压"

            # ── 2. 解压后端服务 ────────────────────────────────
            rm -rf server_new
            tar -xzf server.tar.gz
            # 清理 macOS 产生的 ._ 文件
            find . -name '._*' -delete 2>/dev/null || true
            # 检查打包结构：文件可能散落在根目录或包装在 server/ 下
            if [ -d "./server" ]; then
              mv server server_new
            else
              # 文件散落了，创建 server_new 并移动文件
              mkdir -p server_new
              mv src package.json README.md setup.sh DEPLOY.md .env.example server_new/ 2>/dev/null || true
            fi
            rm server.tar.gz
            echo "✅ 后端服务已解压"

            # ── 3. 创建 .env（从 Secrets 注入）─────────────────
            {
              echo "MULTI_WECOM_CONFIG=${{ secrets.MULTI_WECOM_CONFIG }}"
              echo "WECOM_AGENT_ID=${{ secrets.WECOM_AGENT_ID }}"
              echo "WECOM_AGENT_SECRET=${{ secrets.WECOM_AGENT_SECRET }}"
              echo "PORT=3001"
              echo "FRONTEND_URL=https://docs.whohi.cn"
              echo "SERVER_URL=https://docs.whohi.cn/auth-api"
              echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}"
              echo "NODE_ENV=production"
            } > $DEPLOY_DIR/server_new/.env
            # .env 配置文件已创建
            echo "✅ .env 配置文件已创建 ✓"

            # ── 4. 安装后端依赖 ────────────────────────────────
            cd $DEPLOY_DIR/server_new
            npm install --production
            echo "✅ 后端依赖已安装"

            # ── 5. 停止旧服务 ─────────────────────────────────
            pm2 stop z1-docs-auth 2>/dev/null || true
            pm2 delete z1-docs-auth 2>/dev/null || true
            echo "✅ 旧服务已停止"

            # ── 6. 启动新服务 ─────────────────────────────────
            pm2 start src/index.js \
              --name z1-docs-auth \
              --interpreter node \
              --cwd $DEPLOY_DIR/server_new
            pm2 save
            echo "✅ 后端服务已启动"

            # ── 7. 等待服务就绪 ──────────────────────────────
            sleep 3

            # ── 8. 更新 Nginx 配置（添加 /auth-api 反向代理）───
            if ! grep -q "location /auth-api" $NGINX_CONF; then
              # 在 server 块内的 location / 之前插入反向代理配置
              AUTH_PROXY_BLOCK="    # 企业微信认证 API 反向代理\n    location /auth-api/ {\n        proxy_pass http://127.0.0.1:3001/;\n        proxy_http_version 1.1;\n        proxy_set_header Host \$host;\n        proxy_set_header X-Real-IP \$remote_addr;\n        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto \$scheme;\n    }"
              sed -i "/location \//i\\$AUTH_PROXY_BLOCK" $NGINX_CONF
              echo "✅ Nginx 配置已更新"
            else
              echo "ℹ️  Nginx 配置无需更新（反向代理已存在）"
            fi

            # ── 9. 重载 Nginx ─────────────────────────────────
            nginx -s reload
            echo "✅ Nginx 已重载"

            # ── 10. 健康检查 ──────────────────────────────────
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3001/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ 后端健康检查通过 (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  后端健康检查: HTTP $HTTP_STATUS"
            fi

            # ── 11. 替换旧后端目录 ─────────────────────────────
            cd $DEPLOY_DIR
            rm -rf server
            mv server_new server
            echo "✅ 后端目录已更新"

            echo ""
            echo "════════════════════════════════════════════"
            echo "  🎉 部署完成！"
            echo "  📄 前端: https://docs.whohi.cn"
            echo "  🔐 认证: https://docs.whohi.cn/auth-api"
            echo "════════════════════════════════════════════"
