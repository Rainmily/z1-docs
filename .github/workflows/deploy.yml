name: 🚀 Deploy Docs + Auth Server

on:
  push:
    branches: [master]
    # 跳过 bot 的自动提交，避免 index 更新触发新的 deploy
    paths-ignore:
      - 'docs/news/index.mdx'
      - 'rspress.config.ts'
  workflow_dispatch:

concurrency:
  group: deploy
  # 新 commit 触发时取消旧 deploy，确保始终部署最新代码
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER_ENV_CONFIG: ${{ secrets.SERVER_ENV_CONFIG }}

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 构建前端静态站点 ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 生成行业资讯索引和侧边栏
        run: node scripts/update-industry-news.mjs

      - name: 提交索引更新（如有变更）
        run: |
          # 只添加可能被脚本修改的文件，避免提交无关文件
          git add docs/news/index.mdx rspress.config.ts
          if git diff --staged --quiet; then
            echo "没有变更，无需提交"
          else
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "GitHub Actions"
            git commit -m "chore: 更新行业资讯索引 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Build Rspress site
        run: npm run build

      # ── 3. 直接 SCP 上传构建产物（避免 tarball 打包/解压问题）──
      # 只上传 doc_build 和 server/src，避免覆盖服务器的 .env 文件
      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "doc_build,server/src"
          target: "/www/wwwroot/z1-docs/"
          strip_components: 0
          overwrite: true

      # ── 4. 服务器端：更新配置 + 重启服务 ─────────────────────────
      - name: Deploy & restart services on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 180s
          script: |
            set -e
            DEPLOY_DIR="/www/wwwroot/z1-docs"
            NGINX_CONF="/www/server/nginx/conf/vhost/docs.whohi.cn.conf"

            # ── 1. 验证 SCP 上传的目录完整性 ────────────────────
            if [ ! -d "$DEPLOY_DIR/doc_build/static/js" ]; then
              echo "❌ doc_build/static/js 不存在，SCP 上传失败！"
              ls -la "$DEPLOY_DIR/doc_build/" 2>/dev/null || echo "doc_build 不存在"
              exit 1
            fi
            echo "✅ 前端静态文件完整 (doc_build/)"

            if [ ! -f "$DEPLOY_DIR/server/src/index.js" ]; then
              echo "❌ server/src/index.js 不存在，SCP 上传失败！"
              ls "$DEPLOY_DIR/server/src/" 2>/dev/null || echo "server/src 不存在"
              exit 1
            fi
            echo "✅ 后端服务文件完整 (server/src/)"

            # ── 2. 仅当 .env 不存在时才从 Secret 创建（服务器保留密钥）──
            if [ ! -s "$DEPLOY_DIR/server/.env" ]; then
              if [ -n "$SERVER_ENV_CONFIG" ]; then
                echo "$SERVER_ENV_CONFIG" | base64 -d > "$DEPLOY_DIR/server/.env"
                echo "✅ .env 配置文件已创建"
              else
                echo "⚠️  SERVER_ENV_CONFIG 为空且 .env 不存在，跳过创建"
              fi
            else
              echo "ℹ️  .env 文件已存在，保留服务器密钥"
            fi

            # ── 3. 安装后端依赖 ────────────────────────────────
            cd "$DEPLOY_DIR/server"
            npm install --production
            echo "✅ 后端依赖已安装"

            # ── 4. 清理旧 PM2 进程（杀掉占端口的残留进程）───────────
            OLD_PID=$(lsof -ti:3001 2>/dev/null) || true
            if [ -n "$OLD_PID" ]; then
              echo "杀掉旧进程 PID=$OLD_PID"
              kill -9 $OLD_PID 2>/dev/null || true
              sleep 1
            fi
            pm2 delete z1-docs-auth 2>/dev/null || true
            echo "✅ 旧进程已清理"

            # ── 5. 启动后端服务 ──────────────────────────────
            export NODE_ENV=production
            export PORT=3001
            pm2 start src/index.js \
              --name z1-docs-auth \
              --cwd "$DEPLOY_DIR/server" \
              --interpreter node
            pm2 save
            echo "✅ 后端服务已启动"

            # ── 6. 更新 Nginx 配置（如需要）───────────────────────
            if ! grep -q "location /auth-api" "$NGINX_CONF"; then
              sed -i '/location \//i\    # 企业微信认证 API 反向代理\n    location /auth-api/ {\n        proxy_pass http://127.0.0.1:3001/;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }' "$NGINX_CONF"
              echo "✅ Nginx 配置已更新"
            else
              echo "ℹ️  Nginx 配置无需更新"
            fi
            nginx -s reload
            echo "✅ Nginx 已重载"

            # ── 7. 健康检查 ───────────────────────────────────
            sleep 3
            BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3001/api/health 2>/dev/null || echo "000")
            if [ "$BACKEND_STATUS" = "200" ]; then
              echo "✅ 后端健康检查通过 (HTTP $BACKEND_STATUS)"
            else
              echo "⚠️  后端健康检查: HTTP $BACKEND_STATUS"
              pm2 logs z1-docs-auth --lines 15 --nostream 2>&1 | tail -15
            fi
            if [ -f "$DEPLOY_DIR/doc_build/index.html" ] && [ -d "$DEPLOY_DIR/doc_build/static" ]; then
              echo "✅ 前端静态文件完整 (doc_build/)"
            else
              echo "❌ 前端静态文件缺失！"
              exit 1
            fi

            echo ""
            echo "════════════════════════════════════════════"
            echo "  🎉 部署完成！"
            echo "  📄 前端: https://docs.whohi.cn"
            echo "  🔐 认证: https://docs.whohi.cn/auth-api"
            echo "════════════════════════════════════════════"
