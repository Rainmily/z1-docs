name: 🚀 Deploy Docs + Auth Server

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 构建前端静态站点 ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Rspress site
        run: npm run build

      # ── 3. 打包构建产物 ──────────────────────────────────────
      - name: Package build artifacts
        env:
          COPYFILE_DISABLE: '1'
        run: |
          tar -czf doc_build.tar.gz -C doc_build .
          tar -czf server.tar.gz --exclude='node_modules' --exclude='.env' -C server .

      # ── 4. 部署到服务器 ─────────────────────────────────────
      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "doc_build.tar.gz,server.tar.gz"
          target: "/www/wwwroot/z1-docs/"
          strip_components: 0

      # ── 5. 服务器端：解压 + 重启服务 ─────────────────────────
      - name: Deploy & restart services on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          MULTI_WECOM_CONFIG: ${{ secrets.MULTI_WECOM_CONFIG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 180s
          script: |
            set -e
            DEPLOY_DIR="/www/wwwroot/z1-docs"
            NGINX_CONF="/www/server/nginx/conf/vhost/docs.whohi.cn.conf"

            # ── 1. 解压前端构建产物 ───────────────────────────
            cd $DEPLOY_DIR
            rm -rf doc_build 2>/dev/null || true
            tar -xzf doc_build.tar.gz
            find . -name '._*' -delete 2>/dev/null || true
            rm doc_build.tar.gz
            chown -R lighthouse:lighthouse .
            echo "✅ 前端静态站点已解压"

            # ── 2. 解压后端服务到临时目录 ────────────────────
            rm -rf server_new
            tar -xzf server.tar.gz
            find . -name '._*' -delete 2>/dev/null || true
            # 打包结构可能是 server/ 子目录，也可能直接散落在根目录
            if [ -d "./server" ]; then
              mv server server_new
            else
              mkdir -p server_new
              # 把散落的文件移入 server_new/
              for f in src package.json README.md setup.sh DEPLOY.md .env.example ecosystem.config.cjs ecosystem.config.js; do
                [ -f "$f" ] && mv "$f" server_new/ 2>/dev/null || true
              done
            fi
            rm server.tar.gz
            echo "✅ 后端服务已解压（server_new/）"

            # ── 3. 创建 .env（从 env: 注入）───────────────────
            printf 'PORT=3001\nFRONTEND_URL=https://docs.whohi.cn\nSESSION_SECRET=%s\nSERVER_URL=https://docs.whohi.cn/auth-api\nNODE_ENV=production\nMULTI_WECOM_CONFIG='"'"'%s'"'"'\n' "$SESSION_SECRET" "$MULTI_WECOM_CONFIG" > "$DEPLOY_DIR/server_new/.env"
            echo "✅ .env 配置文件已创建 ✓"

            # ── 4. 安装后端依赖 ────────────────────────────────
            cd $DEPLOY_DIR/server_new
            npm install --production
            echo "✅ 后端依赖已安装"

            # ── 5. 原子替换 server 目录 ──────────────────────
            cd $DEPLOY_DIR
            rm -rf server_old 2>/dev/null || true
            [ -d server ] && mv server server_old || true
            mv server_new server
            echo "✅ server_new → server（目录已替换）"

            # ── 6. 停止旧 PM2 进程（杀掉占端口的残留进程）────
            # 先找端口 3001 上的进程，杀掉
            OLD_PID=$(lsof -ti:3001 2>/dev/null) || true
            if [ -n "$OLD_PID" ]; then
              echo "杀掉旧进程 PID=$OLD_PID"
              kill -9 $OLD_PID 2>/dev/null || true
              sleep 1
            fi
            # 删除旧 PM2 注册（不重启残留进程）
            pm2 delete z1-docs-auth 2>/dev/null || true
            echo "✅ 旧进程已清理"

            # ── 7. 启动新服务（pm2 start src/index.js，不依赖 ecosystem.config.cjs）────
            cd $DEPLOY_DIR/server
            export NODE_ENV=production
            export PORT=3001
            pm2 start src/index.js \
              --name z1-docs-auth \
              --cwd $DEPLOY_DIR/server \
              --interpreter node
            pm2 save
            echo "✅ 后端服务已启动"

            # ── 8. 更新 Nginx 配置 ────────────────────────────
            if ! grep -q "location /auth-api" $NGINX_CONF; then
              AUTH_PROXY_BLOCK="    # 企业微信认证 API 反向代理\n    location /auth-api/ {\n        proxy_pass http://127.0.0.1:3001/;\n        proxy_http_version 1.1;\n        proxy_set_header Host \$host;\n        proxy_set_header X-Real-IP \$remote_addr;\n        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto \$scheme;\n    }"
              sed -i "/location \//i\\$AUTH_PROXY_BLOCK" $NGINX_CONF
              echo "✅ Nginx 配置已更新"
            else
              echo "ℹ️  Nginx 配置无需更新"
            fi

            nginx -s reload
            echo "✅ Nginx 已重载"

            # ── 9. 健康检查 ───────────────────────────────────
            sleep 3
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3001/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ 后端健康检查通过 (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  后端健康检查: HTTP $HTTP_STATUS"
              # 打印 PM2 日志辅助诊断
              pm2 logs z1-docs-auth --lines 15 --nostream 2>&1 | tail -15
            fi

            echo ""
            echo "════════════════════════════════════════════"
            echo "  🎉 部署完成！"
            echo "  📄 前端: https://docs.whohi.cn"
            echo "  🔐 认证: https://docs.whohi.cn/auth-api"
            echo "════════════════════════════════════════════"
