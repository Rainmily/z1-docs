name: 手机行业资讯更新

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch:
    # 支持手动触发

# 防止并发运行导致 git rebase 冲突
concurrency:
  group: industry-news
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出新仓库
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 运行资讯更新脚本
        run: npm run update-news
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

      - name: 提交更新
        run: |
          set -e  # 任何失败立即退出
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"

          # 先 rebase 远程最新代码，冲突时退出而不是静默忽略
          git fetch origin
          git rebase origin/master && {
            # 无冲突才 add + diff
            git add -A
            if git diff --quiet; then
              echo "没有变更，无需提交"
            else
              git commit -m "chore: 更新手机行业资讯 $(date +'%Y-%m-%d %H:%M')"
              git push
              echo "推送成功!"
            fi
          } || {
            echo "⚠️  Rebase 冲突，终止本次更新（下次运行会重试）"
            exit 1
          }
